services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: auto_pro_ia
      POSTGRES_USER: auto_pro_ia
      POSTGRES_PASSWORD: auto_pro_ia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
